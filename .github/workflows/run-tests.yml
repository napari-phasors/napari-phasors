name: Run tests

on:
  push:
    branches:
      - main
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.platform }} py${{ matrix.python-version }} ${{ matrix.qt-backend }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14']
        qt-backend: [pyqt6, pyside6]
        exclude:
          - qt-backend: pyside6
            python-version: '3.12'
          - qt-backend: pyside6
            python-version: '3.14'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # These libraries enable testing on Qt on Linux
      - uses: tlambert03/setup-qt-libs@v1

      # Strategy borrowed from vispy for installing OpenGL libs on Windows
      - name: Install Windows OpenGL
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 https://github.com/pyvista/gl-ci-helpers.git
          powershell gl-ci-helpers/appveyor/install_opengl.ps1

      # Note: If you need dependencies from conda, consider using setup-miniconda:
      # https://github.com/conda-incubator/setup-miniconda and tox-conda:
      # https://github.com/tox-dev/tox-conda
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools tox tox-gh-actions

      # This runs the platform-specific tests declared in tox.ini
      - name: Test with tox
        # DIAGNOSTIC (temporary): a PySide6 worker segfault can leave the xdist
        # controller hanging, which would otherwise run to the 6h job cap and
        # skip the dump-printing step. A step timeout kills just this step so
        # the always() step below still runs and surfaces the captured stack.
        timeout-minutes: 30
        uses: aganders3/headless-gui@v1
        with:
          run: python -m tox
        env:
          PLATFORM: ${{ matrix.platform }}
          BACKEND: ${{ matrix.qt-backend }}
          # DIAGNOSTIC (temporary): per-worker faulthandler dumps, only for the
          # crashing ubuntu-pyside6 combo (empty elsewhere -> no-op in conftest).
          # Remove once the crash is located.
          NP_FAULTHANDLER_DIR: ${{ (matrix.platform == 'ubuntu-latest' && matrix.qt-backend == 'pyside6') && format('{0}/faulthandler', github.workspace) || '' }}

      # DIAGNOSTIC (temporary): surface the per-worker traceback that the
      # crashed/hung xdist worker's discarded stderr would otherwise hide. For
      # a hang, the LAST "Timeout (...)" block in each file is where that
      # process was stuck; for a segfault, look for "Fatal Python error".
      - name: Print faulthandler dumps
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          files=("${{ github.workspace }}"/faulthandler/*.log)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No faulthandler dumps were written."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "===== $f ====="
            cat "$f"
            echo ""
          done

      - name: Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: napari-phasors/napari-phasors

      - name: Upload coverage report
        if: matrix.platform == 'ubuntu-latest' && matrix.python-version == '3.13' && matrix.qt-backend == 'pyqt6'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  static_analysis:
    name: Static code analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Editable install
        run: |
          python -m pip install --upgrade pip
          python -m pip install black isort

      - name: Test with black
        run: |
          python -m black --check src/napari_phasors src/napari_phasors/_tests

      - name: Test with isort
        run: |
          python -m isort --check src/napari_phasors src/napari_phasors/_tests

# taken from https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install pypa/build
      run: >-
        python3 -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: python3 -m build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/napari-phasors/
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: python-package-distributions
        path: dist/
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        verbose: true
