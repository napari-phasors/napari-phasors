name: Build standalone installers

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-installer:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            post_install: post_install.sh
          - os: macos-14
            platform: macos
            post_install: post_install.sh
          - os: windows-latest
            platform: windows
            post_install: post_install.bat

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest

      - name: Install constructor
        shell: bash -el {0}
        run: |
          conda install -y constructor pillow

      - name: Determine version
        id: version
        shell: bash -el {0}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Generate construct.yaml and build
        shell: bash -el {0}
        run: |
          cd installer
          # constructor's license_file requires ASCII-only content. The
          # LICENSE contains a non-ASCII character ('í' in an author
          # name) so we transliterate it to ASCII first. Per Bruno's
          # review suggestion on PR #219.
          python - <<'PY'
          import unicodedata
          from pathlib import Path

          source = Path("../LICENSE")
          target = Path("LICENSE.ascii.txt")
          text = source.read_text(encoding="utf-8")
          ascii_text = (
              unicodedata.normalize("NFKD", text)
              .encode("ascii", "ignore")
              .decode("ascii")
          )
          target.write_text(ascii_text, encoding="ascii")
          PY
          cat > construct.yaml <<'ENDOFYAML'
          name: napari-phasors
          version: VERSION_PLACEHOLDER
          channels:
            - conda-forge
          conda_default_channels:
            - conda-forge
          specs:
            - python=3.12
            - napari
            - pyqt6
            - pip
          post_install: POST_INSTALL_PLACEHOLDER
          license_file: LICENSE.ascii.txt
          ENDOFYAML
          # YAML literal block scalar (|) already strips leading
          # indentation, so the heredoc content is at column 0.
          sed -i.bak "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/" construct.yaml
          sed -i.bak "s/POST_INSTALL_PLACEHOLDER/${{ matrix.post_install }}/" construct.yaml
          if [ -f icon.png ]; then
            python -c "from PIL import Image; img = Image.open('icon.png'); img.save('icon.ico', format='ICO'); img.save('app.icns', format='ICNS')"
            echo "icon_image: icon.png" >> construct.yaml
            echo "extra_files:" >> construct.yaml
            echo "  - icon.png" >> construct.yaml
            echo "  - icon.ico" >> construct.yaml
            echo "  - app.icns" >> construct.yaml
            echo "Found icon.png — adding icon_image and extra_files to construct.yaml"
          else
            echo "No icon.png found — skipping icon_image"
          fi
          echo "=== construct.yaml ==="
          cat construct.yaml
          echo "=== Building ==="
          constructor .

      - name: List outputs
        shell: bash -el {0}
        run: ls -la installer/napari-phasors-*

      - name: Create macOS DMG
        if: matrix.platform == 'macos'
        shell: bash -el {0}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          SH_INSTALLER=( installer/napari-phasors-*.sh )
          if [[ ${#SH_INSTALLER[@]} -ne 1 ]]; then
            echo "ERROR: Expected exactly one .sh installer, found: ${SH_INSTALLER[*]}"
            exit 1
          fi
          SH_INSTALLER="${SH_INSTALLER[0]}"
          INSTALL_DIR="${RUNNER_TEMP}/napari-phasors-install"
          DMG_CONTENTS="${RUNNER_TEMP}/dmg-contents"
          APP_DIR="${DMG_CONTENTS}/napari-phasors.app"

          echo "=== Running .sh installer silently ==="
          bash "${SH_INSTALLER}" -b -p "${INSTALL_DIR}"

          echo "=== Creating .app bundle ==="
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cat > "${APP_DIR}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleName</key>
              <string>napari-phasors</string>
              <key>CFBundleExecutable</key>
              <string>napari-phasors</string>
              <key>CFBundleIdentifier</key>
              <string>org.napari-phasors.app</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleIconFile</key>
              <string>app.icns</string>
            </dict>
          </plist>
          PLIST

          cat > "${APP_DIR}/Contents/MacOS/napari-phasors" << 'LAUNCHER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          ENV_DIR="${SCRIPT_DIR}/../Resources/env"
          source "${ENV_DIR}/bin/activate"
          exec "${ENV_DIR}/bin/python" -m napari "$@"
          LAUNCHER
          chmod +x "${APP_DIR}/Contents/MacOS/napari-phasors"

          echo "=== Moving conda env into .app bundle ==="
          mv "${INSTALL_DIR}" "${APP_DIR}/Contents/Resources/env"

          # If the installer shipped an app.icns at the install root, copy it
          # into the .app Resources so the app has an icon.
          if [ -f "${APP_DIR}/Contents/Resources/env/app.icns" ]; then
            cp "${APP_DIR}/Contents/Resources/env/app.icns" "${APP_DIR}/Contents/Resources/app.icns"
          elif [ -f "${INSTALL_DIR}/app.icns" ]; then
            cp "${INSTALL_DIR}/app.icns" "${APP_DIR}/Contents/Resources/app.icns"
          fi
          echo "=== Fixing shebangs in bundled env ==="
          ENV_BIN="${APP_DIR}/Contents/Resources/env/bin"
          # prefer a specific python binary if present
          if [ -x "${ENV_BIN}/python3.12" ]; then
            PY_BIN="${ENV_BIN}/python3.12"
          elif [ -x "${ENV_BIN}/python3" ]; then
            PY_BIN="${ENV_BIN}/python3"
          else
            PY_BIN="${ENV_BIN}/python"
          fi
          # Rewrite python shebangs to point to the env python
          if [ -d "${ENV_BIN}" ]; then
            find "${ENV_BIN}" -maxdepth 1 -type f -perm +111 -print0 \
              | xargs -0 -I{} perl -pi.bak -e 's{^#!.*python.*}{#!'"${PY_BIN}"'}' {} || true
            # remove backup files left by perl
            find "${ENV_BIN}" -name '*.bak' -delete || true
            chmod -R +x "${ENV_BIN}" || true
          fi
          # Remove absolute 'home' entries in pyvenv.cfg if present
          PVF="${APP_DIR}/Contents/Resources/env/pyvenv.cfg"
          if [ -f "$PVF" ]; then
            sed -i.bak '/^home = /d' "$PVF" || true
            rm -f "$PVF.bak" || true
          fi


          ln -s /Applications "${DMG_CONTENTS}/Applications"

          echo "=== Creating DMG ==="
          ARCH="$(uname -m)"
          hdiutil create \
            -volname "napari-phasors" \
            -srcfolder "${DMG_CONTENTS}" \
            -ov \
            -format UDZO \
            "installer/napari-phasors-${VERSION}-macOS-${ARCH}.dmg"

          rm -f "${SH_INSTALLER}"
          echo "=== DMG created ==="
          ls -la installer/napari-phasors-*

      - name: Upload installer as artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: installer-${{ matrix.platform }}
          path: installer/napari-phasors-*
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@4fabdc8bec0ad32a2eb09fb8fd1d04fd30a75562 # v2.0.5
        with:
          files: installer/napari-phasors-*
